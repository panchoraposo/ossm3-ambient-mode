apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: istio-waypoints-monitor
  namespace: bookinfo
  labels:
    k8s-app: waypoint-monitor
    openshift.io/user-monitoring: "true"
spec:
  selector:
    matchExpressions:
      - key: gateway.networking.k8s.io/gateway-name
        operator: Exists
  podMetricsEndpoints:
    - path: /stats/prometheus
      portNumber: 15020
      interval: 15s
