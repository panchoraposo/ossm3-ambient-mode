apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base-istio129
  - namespace.yaml
  - destinationrule-failover.yaml
  - httproute.yaml
  - route.yaml

patches:
  # Keep ingress gateway as ClusterIP (OpenShift Route exposes it)
  - target:
      kind: Gateway
      name: bookinfo-gateway
    patch: |-
      apiVersion: gateway.networking.k8s.io/v1
      kind: Gateway
      metadata:
        name: bookinfo-gateway
        annotations:
          networking.istio.io/service-type: ClusterIP

  # Baseline: keep waypoints disabled by default.
  # Use-case/demo scripts enable/disable waypoints on demand.
  - target: { kind: Service, name: productpage }
    patch: |-
      apiVersion: v1
      kind: Service
      metadata:
        name: productpage
        labels:
          istio.io/global: "true"

  - target: { kind: Service, name: reviews }
    patch: |-
      apiVersion: v1
      kind: Service
      metadata:
        name: reviews
        labels:
          istio.io/global: "true"

  - target: { kind: Service, name: ratings }
    patch: |-
      apiVersion: v1
      kind: Service
      metadata:
        name: ratings
        labels:
          istio.io/global: "true"

  - target: { kind: Service, name: details }
    patch: |-
      apiVersion: v1
      kind: Service
      metadata:
        name: details
        labels:
          istio.io/global: "true"

